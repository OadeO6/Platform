name: platform_app
description: "A minimalist marketplace app for buying and selling used items."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5
  firebase_dynamic_links: ^6.1.4

  # Auth
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Cloudinary (image storage)
  cloudinary_flutter: ^1.0.0
  cloudinary_url_gen: ^1.0.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Images
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.3.1

  # UI & UX
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  share_plus: ^12.0.1
  url_launcher: ^6.3.1

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Local storage
  shared_preferences: ^2.3.5

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/noise.png
    - assets/icons/app_icon.png
